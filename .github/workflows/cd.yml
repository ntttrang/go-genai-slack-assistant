name: CD

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  GO_VERSION: "1.24.1"
  DOCKER_IMAGE: minhtrang2106/slack-bot

jobs:
  # ─── CI gate (rerun fast checks before any deployment) ───────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
      GOOS: linux
      GOARCH: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify modules
        run: go mod download && go mod verify

      - name: Run unit tests
        run: go test -timeout=5m $(go list ./... | grep -v '/tests')

      - name: Build binary
        run: go build -o bin/slack-bot cmd/api/main.go

  # ─── Build & push Docker image ────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: slackbot-env
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.version }}
          severity: HIGH,CRITICAL
          format: json
          output: trivy-image-report.json

      - name: Upload image scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          retention-days: 7

  # ─── Deploy to staging (develop branch) ──────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/develop'
    environment:
      name: slackbot-env
      url: https://slack-bot-63-a2ae2ba.onrender.com
    steps:
      - name: Trigger Render staging deploy
        run: |
          IMAGE_URL="${{ env.DOCKER_IMAGE }}:${{ needs.docker.outputs.image_tag }}"
          echo "Deploying image: $IMAGE_URL"
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"clearCache\":\"do_not_clear\",\"imageUrl\":\"$IMAGE_URL\"}")
          cat response.json
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "201" ]; then
            echo "Render deploy API returned unexpected status: $HTTP_STATUS"
            exit 1
          fi

      - name: Wait for deployment to stabilize
        run: sleep 60

      - name: Health check (staging)
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://slack-bot-63-a2ae2ba.onrender.com/health)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              curl -s https://slack-bot-63-a2ae2ba.onrender.com/health | python3 -m json.tool || true
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1

  # ─── Deploy to production (main branch, requires approval) ───────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment:
      name: slackbot-env
      url: https://slack-bot-production.onrender.com
    steps:
      - name: Trigger Render production deploy
        run: |
          IMAGE_URL="${{ env.DOCKER_IMAGE }}:${{ needs.docker.outputs.image_tag }}"
          echo "Deploying image: $IMAGE_URL"
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"clearCache\":\"do_not_clear\",\"imageUrl\":\"$IMAGE_URL\"}")
          cat response.json
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "201" ]; then
            echo "Render deploy API returned unexpected status: $HTTP_STATUS"
            exit 1
          fi

      - name: Wait for deployment to stabilize
        run: sleep 60

      - name: Health check (production)
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://slack-bot-production.onrender.com/health)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              curl -s https://slack-bot-production.onrender.com/health | python3 -m json.tool || true
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1
